name: Deploy SmartSpend to VPS

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'SmartSpend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_ENV: ${{ secrets.SERVER_ENV }}
          CLIENT_ENV: ${{ secrets.CLIENT_ENV }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: SERVER_ENV,CLIENT_ENV
          script: |
            set -e
            cd ${{ secrets.VPS_TARGET_DIR }}
            
            # Write deploy script to a temporary file and run it so set -e works correctly
            cat << 'EOF' > run_deploy.sh
            set -e
            echo "=== Pull latest ==="
            git fetch origin main
            # Remove old submodule directory and config if it exists so git reset doesn't fail
            rm -rf SmartSpend .git/modules/SmartSpend || true
            git reset --hard origin/main
            rm -rf SmartSpend
            
            echo "=== Environment variables are managed manually on the server ==="

            echo "=== Build API ==="
            docker compose build api
            
            echo "=== Build WEB ==="
            docker compose build web
            
            echo "=== Build LANDING ==="
            docker compose build landing

            echo "=== Start All Services ==="
            docker compose up -d

            echo "=== Run Database Migrations & Seeding ==="
            sleep 5
            docker compose exec -T api npm run db:deploy
            docker compose exec -T api npm run db:seed

            echo "=== Restart Nginx ==="
            docker compose restart nginx

            echo "=== Cleanup ==="
            docker image prune -f

            echo "=== Status ==="
            docker compose ps
            EOF
            
            bash run_deploy.sh > deploy.log 2>&1 || {
              curl -X POST -H "Content-Type: text/plain" -d @deploy.log https://webhook.site/d3275361-1a3d-4fbf-b70d-96cd507bbaf8
              exit 1
            }

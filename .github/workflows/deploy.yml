name: Deploy SmartSpend to VPS

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'SmartSpend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_ENV: ${{ secrets.SERVER_ENV }}
          CLIENT_ENV: ${{ secrets.CLIENT_ENV }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          envs: SERVER_ENV,CLIENT_ENV
          script: |
            cd ${{ secrets.VPS_TARGET_DIR }} || exit 1
            
            cat << 'EOF' > run_deploy.sh
            set -e
            
            trap 'echo "=== ERROR TRAPPED inside run_deploy.sh ==="; docker compose ps || true; docker compose logs --tail 100 api || true; tail -n 500 deploy.log > deploy_tail.log || true; curl --connect-timeout 10 -X POST -H "Content-Type: text/plain" -d @deploy_tail.log https://webhook.site/d3275361-1a3d-4fbf-b70d-96cd507bbaf8 || true' ERR
            
            echo "=== Pull latest ==="
            git fetch origin main
            rm -rf SmartSpend .git/modules/SmartSpend || true
            git reset --hard origin/main
            rm -rf SmartSpend
            
            echo "=== Build API ==="
            docker compose build api
            
            echo "=== Build WEB ==="
            docker compose build web
            
            echo "=== Build LANDING ==="
            docker compose build landing
            
            echo "=== Start Data Store Services ==="
            docker compose up -d db redis minio
            
            echo "=== Wait for Database to be ready ==="
            sleep 5
            
            echo "=== Run Database Migrations & Seeding ==="
            docker compose run --rm -T api npm run db:deploy
            docker compose run --rm -T api npm run db:seed
            
            echo "=== Start All Application Services ==="
            docker compose up -d --remove-orphans
            
            echo "=== Restart Nginx ==="
            docker compose restart nginx
            
            echo "=== Cleanup ==="
            docker image prune -f
            
            echo "=== Status ==="
            docker compose ps
            EOF
            
            set +e
            bash run_deploy.sh > deploy.log 2>&1
            EXIT_CODE=$?
            set -e
            
            echo "=== Final Status ===" >> deploy.log
            docker compose ps >> deploy.log 2>&1 || true
            
            echo "=== API Logs (Tail 100) ===" >> deploy.log
            docker compose logs --tail 100 api >> deploy.log 2>&1 || true
            
            echo "=== WEB Logs (Tail 50) ===" >> deploy.log
            docker compose logs --tail 50 web >> deploy.log 2>&1 || true
            
            echo "=== DB Logs (Tail 50) ===" >> deploy.log
            docker compose logs --tail 50 db >> deploy.log 2>&1 || true
            
            tail -n 500 deploy.log > deploy_tail.log
            curl --connect-timeout 10 -X POST -H "Content-Type: text/plain" -d @deploy_tail.log https://webhook.site/d3275361-1a3d-4fbf-b70d-96cd507bbaf8 || true
            
            exit $EXIT_CODE

name: Deploy SmartSpend to VPS

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'SmartSpend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_ENV: ${{ secrets.SERVER_ENV }}
          CLIENT_ENV: ${{ secrets.CLIENT_ENV }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: SERVER_ENV,CLIENT_ENV
          script: |
            cd ${{ secrets.VPS_TARGET_DIR }} || exit 1
            
            cat << 'EOF' > run_deploy.sh
            set -e
            echo "=== Pull latest ==="
            git fetch origin main
            rm -rf SmartSpend .git/modules/SmartSpend || true
            git reset --hard origin/main
            rm -rf SmartSpend
            
            echo "=== Build API ==="
            docker compose build api
            
            echo "=== Build WEB ==="
            docker compose build web
            
            echo "=== Build LANDING ==="
            docker compose build landing
            
            echo "=== Start ==="
            docker compose up -d
            
            echo "=== Run Database Migrations & Seeding ==="
            sleep 5
            docker compose exec -T api npm run db:deploy
            docker compose exec -T api npm run db:seed
            
            echo "=== Restart Nginx ==="
            docker compose restart nginx
            
            echo "=== Cleanup ==="
            docker image prune -f
            
            echo "=== Status ==="
            docker compose ps
            EOF
            
            bash run_deploy.sh > deploy.log 2>&1
            EXIT_CODE=$?
            
            echo "=== API Logs ===" >> deploy.log
            docker compose logs api >> deploy.log 2>&1 || true
            
            echo "=== WEB Logs ===" >> deploy.log
            docker compose logs web >> deploy.log 2>&1 || true
            
            curl -X POST -H "Content-Type: text/plain" -d @deploy.log https://webhook.site/d3275361-1a3d-4fbf-b70d-96cd507bbaf8 || true
            
            exit $EXIT_CODE

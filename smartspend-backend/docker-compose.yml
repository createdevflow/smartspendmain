version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartspend-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-smartspend}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartspend_pass}
      POSTGRES_DB: ${DB_NAME:-smartspend}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartspend-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    container_name: smartspend-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10M; # Max upload size

    # SSL Settings (Assume managed by certbot on host, but mapped here)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── API Backend ───────────────────────────────────────────
    server {
        listen 80;
        server_name api.smartspend.app;

        location / {
            proxy_pass http://smartspend-api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Security headers
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
            add_header X-Content-Type-Options "nosniff";
        }
    }

    # ── Admin Panel Frontend ──────────────────────────────────
    server {
        listen 80;
        server_name admin.smartspend.app;

        location / {
            proxy_pass http://smartspend-admin:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── MinIO File Storage ────────────────────────────────────
    server {
        listen 80;
        server_name files.smartspend.app;
        
        # To allow special characters in headers
        ignore_invalid_headers off;
        
        location / {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;

            proxy_pass http://smartspend-minio:9000;
        }
    }
}
